    <thead>
      <tr>
        <th>对话内容</th>
        <th>开始时间</th>
        <th>提问轮次</th>
        <th>工具调用</th>
        <th>AI轮次</th>
        <th>活跃时长</th>
      </tr>
    </thead>
    <tbody id="conv-tbody"></tbody>
  </table>
</div>

<div class="note" id="note-text"></div>

<script>
  const DATA_URL = "./data.json?t=" + Date.now();

  Promise.resolve(window.__INLINE_DATA__)
    .then(r => r.json())
    .then(data => render(data))
    .catch(e => {
      document.getElementById("updated").textContent = "数据加载失败，请先运行 generate_data.py";
    });

  function render(data) {
    const s = data.summary;

    // 更新时间
    document.getElementById("updated").textContent = "数据更新于 " + s.updated_at;

    // 数字统一保留1位小数的辅助函数
    const f1 = v => (Math.round(v * 10) / 10).toFixed(1);

    // KPI
    document.getElementById("kpi-hr").textContent = f1(s.total_active_hr);
    document.getElementById("kpi-min").textContent = f1(s.total_active_min) + " 分钟";
    document.getElementById("kpi-avg-day").textContent = f1(s.avg_daily_active_min);
    document.getElementById("kpi-avg-day-sub").textContent = s.active_days + " 天有使用记录";
    document.getElementById("kpi-avg-cal").textContent = f1(s.avg_calendar_daily_min);
    document.getElementById("kpi-avg-cal-sub").textContent = "共 " + s.calendar_days + " 个日历天";
    document.getElementById("kpi-msgs").textContent = s.total_msgs;
    document.getElementById("kpi-msgs-sub").textContent = f1(s.avg_msgs_per_conv) + " 次/对话";
    document.getElementById("kpi-tools").textContent = s.total_tools;
    document.getElementById("kpi-tools-sub").textContent = f1(s.avg_tools_per_conv) + " 次/对话";
    document.getElementById("kpi-convs").textContent = s.total_convs;
    document.getElementById("kpi-convs-sub").textContent = s.active_days + " 天有记录";

    // 亮点标签生成
    const toolsPerMsg = s.total_msgs > 0 ? (s.total_tools / s.total_msgs) : 0;
    const usageRate = s.calendar_days > 0 ? (s.active_days / s.calendar_days * 100) : 0;
    const maxDay = data.daily.reduce((a, b) => b.active_min > a.active_min ? b : a, data.daily[0]);
    const insights = [
      {
        icon: "🤖",
        text: "Agent 深度用户：每次提问触发 " + f1(toolsPerMsg) + " 次工具调用，远超简单问答模式",
        cls: "tag-green"
      },
      {
        icon: "⏱️",
        text: "单次深度使用：平均每次对话活跃 " + f1(s.avg_min_per_conv) + " 分钟，属于长任务驱动型",
        cls: "tag-blue"
      },
      {
        icon: "📅",
        text: "使用频率：" + s.active_days + " / " + s.calendar_days + " 天有记录（" + Math.round(usageRate) + "%），" + (usageRate >= 60 ? "已形成日常习惯" : "使用集中在特定任务日"),
        cls: "tag-purple"
      },
      {
        icon: "🏆",
        text: "最高强度日：" + (maxDay ? maxDay.date.slice(5) + " 活跃 " + f1(maxDay.active_min) + " 分钟，工具调用 " + maxDay.tools + " 次" : "-"),
        cls: "tag-amber"
      },
      {
        icon: "⚡",
        text: "总算力消耗：" + s.total_tools + " 次工具调用，平均每分钟触发 " + f1(s.total_tools / (s.total_active_min || 1)) + " 次",
        cls: "tag-red"
      },
    ];
    document.getElementById("insight-tags").innerHTML = insights.map(i =>
      `<span class="insight-tag ${i.cls}">${i.icon} ${i.text}</span>`
    ).join("");

    // 说明
    document.getElementById("note-text").innerHTML =
      "⚠️ 说明：本地日志仅保留最近约 50 个对话（CatPaw 自动清理），日志范围 " +
      s.log_range_start + " ~ " + s.log_range_end +
      "，不代表全量历史。活跃时长已剔除 >30 分钟的空闲间隔。工具调用含读文件、搜索、浏览器等所有 AI 自动操作。";

    // 图表1：每日活跃时长柱状图
    const chartTime = echarts.init(document.getElementById("chart-daily-time"));
    const dates = data.daily.map(d => d.date.slice(5)); // MM-DD
    const activeMins = data.daily.map(d => d.active_min);
    chartTime.setOption({
      backgroundColor: "transparent",
      tooltip: { trigger: "axis", formatter: p => p[0].name + "<br/>活跃时长：" + p[0].value + " 分钟" },
      grid: { left: 40, right: 16, top: 16, bottom: 36 },
      xAxis: {
        type: "category", data: dates,
        axisLabel: { color: "#64748b", fontSize: 11 },
        axisLine: { lineStyle: { color: "#2d3748" } },
        axisTick: { show: false },
      },
      yAxis: {
        type: "value",
        axisLabel: { color: "#64748b", fontSize: 11 },
        splitLine: { lineStyle: { color: "#1e2a3a" } },
      },
      series: [{
        type: "bar", data: activeMins,
        barMaxWidth: 40,
        itemStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: "#6ee7b7" },
            { offset: 1, color: "#059669" },
          ]),
          borderRadius: [4, 4, 0, 0],
        },
        label: {
          show: true, position: "top",
          color: "#94a3b8", fontSize: 10,
          formatter: p => p.value > 0 ? (+p.value).toFixed(1) : "",
        },
      }],
    });

    // 图表2：每日提问 & 工具调用折线图
    const chartMsgs = echarts.init(document.getElementById("chart-daily-msgs"));
    chartMsgs.setOption({
      backgroundColor: "transparent",
      tooltip: { trigger: "axis" },
      legend: {
        data: ["提问次数", "工具调用"],
        textStyle: { color: "#94a3b8", fontSize: 11 },
        top: 0, right: 0,
      },
      grid: { left: 36, right: 16, top: 28, bottom: 36 },
      xAxis: {
        type: "category", data: dates,
        axisLabel: { color: "#64748b", fontSize: 11 },
        axisLine: { lineStyle: { color: "#2d3748" } },
        axisTick: { show: false },
      },
      yAxis: {
        type: "value",
        axisLabel: { color: "#64748b", fontSize: 11 },
        splitLine: { lineStyle: { color: "#1e2a3a" } },
      },
      series: [
        {
          name: "提问次数", type: "bar",
          data: data.daily.map(d => d.msgs),
          barMaxWidth: 20,
          itemStyle: { color: "#c084fc", borderRadius: [3, 3, 0, 0] },
        },
        {
          name: "工具调用", type: "line",
          data: data.daily.map(d => d.tools),
          smooth: true,
          symbol: "circle", symbolSize: 5,
          lineStyle: { color: "#f87171", width: 2 },
          itemStyle: { color: "#f87171" },
          yAxisIndex: 0,
        },
      ],
    });

    // 对话明细表格（倒序，最新在前）
    const tbody = document.getElementById("conv-tbody");
    const convs = [...data.conversations].reverse();
    const isRawId = t => /^[0-9a-f]{8}$/.test(t);
    tbody.innerHTML = convs.map(c => {
      const hasTitle = c.title && !isRawId(c.title);
      const titleHtml = hasTitle
        ? `<span title="${c.title}">${c.title}</span>`
        : `<span class="title-no-match" title="${c.conv_id}">${c.conv_id}</span>`;
      return `
      <tr>
        <td class="title-cell">${titleHtml}</td>
        <td>${c.date_str}</td>
        <td>${c.user_msgs}</td>
        <td>${c.tool_calls}</td>
        <td>${c.turns}</td>
        <td><span class="badge badge-green">${c.active_min} 分钟</span></td>
      </tr>`;
    }).join("");

    // 响应式
    window.addEventListener("resize", () => {
      chartTime.resize();
      chartMsgs.resize();
    });
  }
</script>
</body>
</html>
